<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <title>Chrono — Circuits d'exercice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===================== ÉDITEUR ===================== -->
  <main id="editor" class="view">
    <header class="topbar">
      <h1>Chrono</h1>
      <div class="topbar-actions">
        <select id="savedSelect" aria-label="Circuits enregistrés">
          <option value="">— Charger un circuit —</option>
        </select>
        <button id="loadBtn" class="btn">Charger</button>
        <button id="deleteSavedBtn" class="btn btn-ghost">Supprimer</button>
      </div>
    </header>

    <section class="circuit-head">
      <input id="circuitName" class="circuit-name" type="text" placeholder="Nom du circuit (ex : Full body matin)" />
      <div class="circuit-meta">
        <span id="totalTime">Durée totale : 0:00</span>
      </div>
    </section>

    <div id="groups" class="groups"></div>

    <div class="editor-footer">
      <button id="addGroupBtn" class="btn btn-secondary">+ Ajouter un ensemble</button>
      <div class="spacer"></div>
      <button id="newCircuitBtn" class="btn btn-ghost">Nouveau</button>
      <button id="saveBtn" class="btn">Enregistrer</button>
      <button id="startBtn" class="btn btn-primary">▶ Démarrer</button>
    </div>
  </main>

  <!-- ===================== LECTEUR ===================== -->
  <section id="player" class="view hidden">
    <div id="playerStage" class="player-stage">
      <div class="player-top">
        <span id="playerRound" class="badge"></span>
        <button id="stopBtn" class="btn btn-ghost">✕ Quitter</button>
      </div>

      <div class="player-center">
        <div id="playerStepName" class="step-name">—</div>
        <div id="playerTime" class="time">0:00</div>
        <div id="playerNext" class="next">Suivant : —</div>
      </div>

      <div class="progress"><div id="progressBar" class="progress-bar"></div></div>

      <div class="player-controls">
        <button id="prevBtn" class="btn btn-round" title="Étape précédente">⏮</button>
        <button id="pauseBtn" class="btn btn-round btn-primary" title="Pause / Reprendre">⏸</button>
        <button id="skipBtn" class="btn btn-round" title="Étape suivante">⏭</button>
      </div>
    </div>
  </section>

  <!-- Gabarit d'une étape -->
  <template id="stepTpl">
    <div class="step" data-id="">
      <span class="drag-hint" aria-hidden="true">⋮⋮</span>
      <select class="step-type" aria-label="Type">
        <option value="exercise">Exercice</option>
        <option value="pause">Pause</option>
      </select>
      <input class="step-name-input" type="text" placeholder="Nom" />
      <div class="duration">
        <input class="step-min" type="number" min="0" max="59" inputmode="numeric" /> <span>min</span>
        <input class="step-sec" type="number" min="0" max="59" inputmode="numeric" /> <span>s</span>
      </div>
      <div class="step-actions">
        <button class="icon up" title="Monter">↑</button>
        <button class="icon down" title="Descendre">↓</button>
        <button class="icon dup" title="Dupliquer l'étape">⧉</button>
        <button class="icon del" title="Supprimer">🗑</button>
      </div>
    </div>
  </template>

  <!-- Garde l'écran allumé pendant la séance (API Wake Lock + repli vidéo).
       NoSleep.js v0.12.0 — Rich Tibbett, licence MIT. -->
  <script src="nosleep.js"></script>
  <script src="app.js"></script>
</body>
</html>
